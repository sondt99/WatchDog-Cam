services:
  camera-hub:
    build: .
    container_name: camera-hub
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # .env is mounted into the container so Telegram config can be changed without rebuilding
      - ./.env:/app/.env:ro
      # persistent data (camera list)
      - ./data:/data
    environment:
      - TZ=Asia/Ho_Chi_Minh
